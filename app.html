<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.googleapis.com">

<body>

<!-- Hero Section -->
<div class="header">
    <h1>Turn Your Smile Into Crypto</h1>
</div>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="camera-section">
        <h2>Smile Detector</h2>
        <video id="video" width="500" height="380" autoplay></video>
        <button onclick="startApp()" id="btn">Start Camera</button>
    </div>

    <!-- RIGHT SIDE -->
    <div class="wallet-section">
        <h2>Enter Wallet</h2>

        <p>Please enter your Solana Devnet Wallet Address:</p>

        <input type="text" id="wallet" placeholder="5JJ8ex..." size="40">

        <button onclick="startApp()" id="btn">Submit</button>


        <div id="status">Waiting to start...</div>
    </div>

</div>


<div class="points">
    <h2>Total Smile Points</h2>
    <p>0 SMILE</p>
</div>

<script src="static/script.js"></script>
