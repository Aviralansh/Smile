<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SMILE to Earn</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #111; color: white; }
        video { border-radius: 12px; margin-top: 20px; border: 3px solid #4CAF50; }
        #status { font-size: 24px; font-weight: bold; margin: 20px; color: #4CAF50; }
    </style>
</head>
<body>

    <h1>Say "Cheese" to Earn SMILE Tokens!</h1>
    <p>Please enter your Solana Devnet Wallet Address:</p>
    <input type="text" id="wallet" placeholder="5JJ8ex..." size="50">
    <br><br>
    
    <button onclick="startApp()">Start Camera & Mic</button>
    <div id="status">Waiting to start...</div>

    <video id="video" width="640" height="480" autoplay></video>
    
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
    <button id="send" onclick="captureAndSend()"> SMILE </button>
    
    <script src="script.js"></script>
    
</body>
</html>
